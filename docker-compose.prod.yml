services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: perbillion
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: perbillion
    volumes:
      - mongodb_data:/data/db
      - ./database/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - perbillion-network
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  ml-engine:
    image: perbillion-ml-engine:prod
    build:
      context: ./services/ml-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
    volumes:
      - ml_cache:/app/cache
    networks:
      - perbillion-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  spring-orchestrator:
    image: perbillion-spring-orchestrator:prod
    build:
      context: ./services/spring-orchestrator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=45 -XX:InitialRAMPercentage=20}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      MONGODB_URI: ${MONGODB_URI:-mongodb://perbillion:${MONGO_PASSWORD}@mongodb:27017/perbillion?authSource=admin}
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI:-mongodb://perbillion:${MONGO_PASSWORD}@mongodb:27017/perbillion?authSource=admin}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-perbillion}
      ML_ENGINE_URL: http://ml-engine:5000
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:?ALPHAVANTAGE_API_KEY is required}
    networks:
      - perbillion-network
    depends_on:
      mongodb:
        condition: service_healthy
      ml-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    image: perbillion-api-gateway:prod
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      PORT: "3000"
      MONGODB_URI: ${MONGODB_URI:-mongodb://perbillion:${MONGO_PASSWORD}@mongodb:27017/perbillion?authSource=admin}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-perbillion}
      SPRING_ORCHESTRATOR_URL: http://spring-orchestrator:8080
      ML_ENGINE_URL: http://ml-engine:5000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
    networks:
      - perbillion-network
    depends_on:
      mongodb:
        condition: service_healthy
      spring-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: perbillion-frontend:prod
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    networks:
      - perbillion-network
    depends_on:
      api-gateway:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - perbillion-network
    depends_on:
      frontend:
        condition: service_started
      api-gateway:
        condition: service_healthy

networks:
  perbillion-network:
    driver: bridge

volumes:
  mongodb_data:
  ml_cache:
  caddy_data:
  caddy_config:
